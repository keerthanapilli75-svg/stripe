<!DOCTYPE html>
<html>
<head>
<title>Stripe Style Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:white;
overflow-x:hidden;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
}

.logo{
font-size:26px;
font-weight:bold;
color:#635bff;
}

nav a{
margin:0 15px;
text-decoration:none;
color:black;
font-weight:500;
}

.sign{
background:#635bff;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:100px 80px;
position:relative;
}

.text{
max-width:550px;
}

.text h1{
font-size:48px;
}

.text p{
margin-top:20px;
color:#555;
font-size:18px;
}

.btn{
margin-top:25px;
padding:12px 22px;
background:#635bff;
color:white;
border:none;
border-radius:6px;
}

/* GRADIENT */

.gradient{
position:absolute;
right:0;
top:0;
width:500px;
height:500px;
background:linear-gradient(45deg,#635bff,#ff6ec4,#ffa500);
filter:blur(120px);
animation:move 8s infinite alternate;
}

@keyframes move{

0%{transform:translate(0,0);}
100%{transform:translate(-120px,120px);}

}

/* MOVING COMPANY NAMES */

.logo-slider{
overflow:hidden;
white-space:nowrap;
background:#f7f7f7;
padding:30px 0;
}

.logo-track{
display:inline-block;
animation:scroll 12s linear infinite;
}

.logo-track span{
margin:0 60px;
font-size:20px;
font-weight:bold;
color:#666;
}

@keyframes scroll{

0%{
transform:translateX(-100%);
}

100%{
transform:translateX(100%);
}

}

</style>
</head>

<body>

<header>

<div class="logo">Stripe</div>

<nav>
<a href="#">Products</a>
<a href="#">Solutions</a>
<a href="#">Developers</a>
<a href="#">Pricing</a>
</nav>

<button class="sign">Sign in</button>

</header>


<section class="hero">

<div class="text">

<h1>Financial infrastructure to grow your revenue.</h1>

<p>
Accept payments, offer financial services and implement custom revenue models.
</p>

<button class="btn">Request an invite</button>

</div>

<div class="gradient"></div>

</section>


<div class="logo-slider">

<div class="logo-track">

<span>Google</span>
<span>Shopify</span>
<span>Amazon</span>
<span>Zoom</span>
<span>Coinbase</span>
<span>Slack</span>
<span>Uber</span>

</div>

</div>

</body>
</html>
